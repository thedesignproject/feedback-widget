version: 2
updates:
  # GitHub Actions: keep pinned action versions + gitleaks fresh.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - deps
      - ci

  # npm: group dev-dep churn (mostly @testing-library, vitest, @vercel/node)
  # into a single weekly PR so advisory chatter doesn't drown real signal.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - deps
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
