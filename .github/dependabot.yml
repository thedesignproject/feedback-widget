version: 2
updates:
  # GitHub Actions: keep pinned action versions + gitleaks fresh.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - deps
      - ci

  # npm: group dev-dep churn (mostly @testing-library, vitest, @vercel/node)
  # into a single weekly PR so advisory chatter doesn't drown real signal.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - deps
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
    # The Vite 8 + vitest 4 + plugin-react 6 stack moves together. Bumping
    # one without the others fails peer resolution. Defer the whole quartet
    # until we schedule the migration (see closed #26 / #27 / #32).
    ignore:
      - dependency-name: vite
        update-types:
          - version-update:semver-major
      - dependency-name: "@vitejs/plugin-react"
        update-types:
          - version-update:semver-major
      - dependency-name: vitest
        update-types:
          - version-update:semver-major
      - dependency-name: "@vitest/coverage-v8"
        update-types:
          - version-update:semver-major
